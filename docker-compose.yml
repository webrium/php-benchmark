
services:
  laravel:
    build:
      context: ./docker
      dockerfile: Dockerfile.laravel
    container_name: benchmark-laravel
    ports:
      - "8002:8002"
    volumes:
      - ./laravel-app:/var/www/laravel
    environment:
      DB_HOST: "host.docker.internal"
      DB_PORT: "3306"
      DB_DATABASE: "benchmark"
      DB_USERNAME: "root"
      DB_PASSWORD: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  webrium:
    build:
      context: ./docker
      dockerfile: Dockerfile.webrium
    container_name: benchmark-webrium
    ports:
      - "8001:8001"
    volumes:
      - ./webrium-app:/var/www/webrium
    environment:
      DB_HOST: "host.docker.internal"
      DB_PORT: "3306"
      DB_DATABASE: "benchmark"
      DB_USERNAME: "root"
      DB_PASSWORD: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  codeigniter:
    build:
      context: ./docker
      dockerfile: Dockerfile.codeigniter
    container_name: benchmark-codeigniter
    ports:
      - "8003:8003"
    volumes:
      - ./codeigniter-app:/var/www/codeigniter
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  symfony:
    build:
      context: ./docker
      dockerfile: Dockerfile.symfony
    container_name: benchmark-symfony
    ports:
      - "8004:8004"
    volumes:
      - ./symfony-app:/var/www/symfony
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
